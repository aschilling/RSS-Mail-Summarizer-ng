steps:
  # 1. Schritt: Deploy die Sendmail Funktion
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    dir: 'functions/sendmail'
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - sendmail-trigger
      - --gen2
      - --runtime=python311
      - --region=europe-west3
      - --source=. 
      - --entry-point=sendmail_trigger
      - --trigger-http
      - --memory=2GiB
      - --timeout=300s
      - --set-secrets=GMAIL_TOKEN_JSON=gmail-token:latest,GEMINI_API_KEY=gemini-api-key:latest,RECIPIENT_EMAIL=recipient-email:latest,RSS_FIREBASE_KEY=rss-firebase-key:latest,SENDER_EMAIL=sender-email:latest
      - --set-env-vars=PROJECT_ID=${_PROJECT_ID},LOG_LEVEL=INFO

options:
  logging: CLOUD_LOGGING_ONLY